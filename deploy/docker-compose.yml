version: "3.8"

services:
  turnier-frontend:
    image: ghcr.io/jf-landkreis-karlsruhe/turnier-frontend:latest
    ports:
      - "8081:80" # Mapping port 8081 on the host to port 80 on the container
    environment:
      - BACKEND_URL=localhost:8080
    depends_on:
      - turnier-backend

  turnier-backend:
    image: ghcr.io/jf-landkreis-karlsruhe/turnier-backend:latest
    ports:
      - "8080:8080" # Mapping port 8080 on the host to port 8080 on the container
    environment:
      - SPRING_APPLICATION_NAME=turnier-backend
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin
      - SPRING_DATASOURCE_URL=jdbc:mariadb://turnier-maria:3306/turnier
      - TZ=Europe/Berlin
    depends_on:
      database:
        condition: service_healthy

  database:
    image: mariadb:latest
    container_name: turnier-maria
    user: "${UID}:${GID}"
    volumes:
      - ./data01:/var/lib/mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: turnier
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  admin-frontend:
    image: ghcr.io/jf-landkreis-karlsruhe/turnier-admin:latest
    ports:
      - "8082:80"
    environment:
      - BACKEND_URL=localhost:8080

  db-backup:
    image: mariadb:latest
    restart: always
    depends_on:
      - database
    volumes:
      - ./backups:/backups
    environment:
      - MYSQL_PWD=root
    entrypoint: >
      sh -c "while true; do
        sleep 600;
        FILENAME=/backups/backup_$$(date +%Y-%m-%d_%H-%M).sql;
        mariadb-dump -h turnier-maria -u root turnier > $$FILENAME;
        echo \"Backup gespeichert: $$FILENAME\";
      done"

  turnier-sync:
    image: ghcr.io/jf-landkreis-karlsruhe/turnier-sync:latest
    restart: always
    environment:
      - BACKEND_URL=http://turnier-backend:8080
      - FTP_HOST=${FTP_HOST}
      - FTP_USER=${FTP_USER}
      - FTP_PASS=${FTP_PASS}
      - FTP_PATH=${FTP_PATH:-/data}
      - FTP_TLS=${FTP_TLS:-false}
      - SYNC_INTERVAL=${SYNC_INTERVAL:-30}
    depends_on:
      - turnier-backend
