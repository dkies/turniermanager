name: Build live-ticker

on:
  push:
    tags:
      - "*"
    branches:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment zip
        working-directory: live-ticker
        run: |
          zip -r ../live-ticker.zip \
            index.html \
            manifest.json \
            sw.js \
            css/ \
            js/ \
            assets/ \
            data/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: live-ticker
          path: live-ticker.zip
